    description: >-
      The Zep Cloud API delivers agent memory and temporal knowledge graph
      services over REST. It exposes endpoints for users, sessions, messages,
      memory retrieval, the per-user graph, facts, summaries, and customizable
      context blocks for prompt assembly.
