aid: zep
name: Zep
description: >-
  Zep is a context engineering and agent memory platform that assembles
  relevant context from chat history, business data, and user interactions for
  AI agents. It builds a temporal knowledge graph per user that evolves as new
  facts arrive, automatically extracts entities, and invalidates facts that
  are superseded. Zep exposes a Graph RAG layer with customizable context
  blocks for fast personalization. The platform offers Cloud and self-hosted
  community editions with Python, TypeScript, and Go SDKs and integrations
  with LangChain, LangGraph, LlamaIndex, CrewAI, and AutoGen. Zep targets
  sub-200ms p95 retrieval latency and is SOC 2 Type II and HIPAA aligned for
  enterprise deployments.
